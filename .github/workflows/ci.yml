name: CI

# Continuous integration build + test. Fires on:
#   - every push to main (catches breakage in your own commits)
#   - every pull request (gives reviewers a green/red signal)
# Releases live in release.yml (separate workflow, fires on tag push)
# so the CI run stays fast and never produces release artifacts.

on:
  push:
    branches: [main]
  pull_request:

# Auto-cancel an in-progress CI run if a newer commit lands on the
# same branch / PR - no point burning runner minutes on stale code.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read vcpkg baseline from manifest
        id: vcpkg
        shell: pwsh
        run: |
          $baseline = (Get-Content vcpkg.json | ConvertFrom-Json).'builtin-baseline'
          "baseline=$baseline" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Set up pinned vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ steps.vcpkg.outputs.baseline }}

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-installed-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-installed-${{ runner.os }}-

      - name: Configure (CMake + vcpkg manifest mode)
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release --parallel

      # Python role-plays an iOS client for 6 scenarios (pair-verify
      # round-trip, real iOS headers, signature corruption, concurrent
      # sessions, fp-setup framing, legacy ANNOUNCE/SETUP/RECORD/
      # TEARDOWN). Catches handshake regressions without an iPhone.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python deps
        run: pip install cryptography

      # Integration test: the Python harness expects a live AirPlay
      # server on 127.0.0.1:7000. Start the binary in the background,
      # poll for the listener, run the test, then teardown. SDL's
      # dummy drivers keep video / audio init happy on a runner that
      # has no interactive desktop / audio device.
      - name: Run pair-verify protocol tests
        shell: pwsh
        run: |
          $env:SDL_VIDEODRIVER = "dummy"
          $env:SDL_AUDIODRIVER = "dummy"
          $proc = Start-Process `
            -FilePath "build\Release\airplay-windows.exe" `
            -ArgumentList "--log" `
            -PassThru `
            -RedirectStandardOutput "airplay.stdout.log" `
            -RedirectStandardError "airplay.stderr.log"

          # Poll the listener for up to 15 s rather than a blind sleep:
          # vcpkg-built FFmpeg cold-init + SDL sometimes takes 2-3 s
          # extra on a fresh runner.
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            try {
              $c = New-Object System.Net.Sockets.TcpClient
              $c.Connect("127.0.0.1", 7000)
              $c.Close()
              $ready = $true
              break
            } catch {
              Start-Sleep -Milliseconds 500
            }
          }
          if (-not $ready) {
            Write-Host "::error::AirPlay server never bound :7000 within 15 s"
          }

          $testCode = 1
          try {
            python tools/test_pair_verify.py
            $testCode = $LASTEXITCODE
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

          Write-Host "--- airplay stdout (last 80 lines) ---"
          if (Test-Path airplay.stdout.log) { Get-Content airplay.stdout.log -Tail 80 }
          Write-Host "--- airplay stderr (last 80 lines) ---"
          if (Test-Path airplay.stderr.log) { Get-Content airplay.stderr.log -Tail 80 }

          exit $testCode
