name: Release

# Builds the Windows binary on a GitHub-hosted Windows runner and
# attaches a zipped Release/ folder to a draft GitHub Release.
#
# Triggers:
#   - Push of a tag matching v* (e.g. v0.1.0): creates / updates the
#     draft release for that tag with the artifact attached.
#   - Manual workflow_dispatch from the Actions tab: builds the
#     binary and uploads it as a workflow artifact only.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed for softprops/action-gh-release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The pre-installed vcpkg on windows-latest sits at a recent
      # commit whose working tree carries port versions that aren't
      # listed in our manifest's `builtin-baseline` versions/baseline.json.
      # Clone a fresh vcpkg pinned at our baseline so port versions
      # and baseline stay in sync. lukka/run-vcpkg caches the clone
      # and bootstrap output keyed on the commit id.
      - name: Read vcpkg baseline from manifest
        id: vcpkg
        shell: pwsh
        run: |
          $baseline = (Get-Content vcpkg.json | ConvertFrom-Json).'builtin-baseline'
          "baseline=$baseline" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "vcpkg baseline = $baseline"

      - name: Set up pinned vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ steps.vcpkg.outputs.baseline }}

      # Cache the manifest install output (libplist + openssl + ffmpeg
      # + sdl2 + sdl2-ttf compiled artifacts) keyed on vcpkg.json.
      # Subsequent runs skip the ~10 min compile step.
      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-installed-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-installed-${{ runner.os }}-

      - name: Configure (CMake + vcpkg manifest mode)
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release --parallel

      - name: Package zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrEmpty($tag) -or $tag -eq "main") {
            $tag = "dev-$($env:GITHUB_SHA.Substring(0,7))"
          }
          $zipName = "airplay-windows-$tag-x64.zip"
          Compress-Archive -Path build\Release\* -DestinationPath $zipName -Force
          "ZIP_PATH=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append
          Get-ChildItem $zipName | Format-List Name, Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}
          retention-days: 30

      - name: Create / update draft release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
          draft: true
          generate_release_notes: true
          name: ${{ github.ref_name }}
